name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day at midnight UTC
  workflow_dispatch:        # lets you also trigger it manually
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: TAMILARASU-A
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2316A34A&color_dots=#0e4429,#006d32,#26a641,#39d353,#56f177
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2316A34A

      - name: Push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
